{% extends 'base.html' %}

{% block title %}Aviara - Recuperar Contraseña{% endblock %}

{% block content %}
<div class="flex justify-center items-center" style="min-height: 70vh;">
    <div class="max-w-md w-full bg-white shadow-2xl rounded-3xl p-8 border-t-8 border-green-700">
        <div class="text-center mb-6">
            <h2 class="text-3xl font-extrabold text-gray-800">¿Olvidaste tu clave?</h2>
            <p class="text-gray-500 mt-2 text-sm">
                Introduce tu correo electrónico y te enviaremos las instrucciones para crear una nueva.
            </p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label for="id_email" class="block text-sm font-semibold text-gray-700 mb-2">
                    Correo electrónico registrado
                </label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        📧
                    </span>
                    <input type="email" name="email" id="id_email" required 
                        class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition duration-200"
                        placeholder="ejemplo@correo.com">
                </div>
            </div>

            <button type="submit" 
                class="w-full bg-green-700 hover:bg-green-800 text-white font-bold py-3 rounded-xl shadow-lg transform transition hover:-translate-y-1 active:scale-95">
                Enviar instrucciones
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <a href="{% url 'login' %}" class="text-green-700 font-medium hover:text-green-900 hover:underline transition">
                ← Volver al inicio de sesión
            </a>
        </div>
    </div>
</div>
{% endblock %}
